<h1 class="">Сверка документов с контрагентами (1С:Сверка 2.0)</h1>
<p style="margin-left: 0px">Позволяет сверять введенные в программу данные о первичных, банковских документах и счетах-фактурах с аналогичными данными, введенными контрагентами.<br>Отображает пары документов с обнаруженными расхождениями. </p>
