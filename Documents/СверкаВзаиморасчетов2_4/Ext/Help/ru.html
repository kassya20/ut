<h1 class="">Сверка взаиморасчетов (2.4)</h1>
<p style="margin-left: 0px">Документ предназначен для контроля и регистрации сверки взаиморасчетов. Сверка взаиморасчетов может быть оформлена между организациями, между организацией и сторонним контрагентом. </p>
